name: 构建 Windows 智一会计

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 openpyxl pandas xlrd pyinstaller

    - name: 执行 PyInstaller 打包
      run: pyinstaller --noconsole --onefile --name "智一会计" --icon main.ico --add-data "pages;pages" --hidden-import=pages.client --hidden-import=pages.voucher --hidden-import=pages.account --hidden-import=pages.settle --hidden-import=pages.report --hidden-import=pages.audit --hidden-import=pages.system main.py

    - name: 上传生成的 EXE 文件
      uses: actions/upload-artifact@v4
      with:
        name: 智一会计-Windows版
        path: dist/智一会计.exe
        retention-days: 30