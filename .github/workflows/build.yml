name: 构建 Windows 智一会计

on:
  push:
    branches:
      - main
      - refactor/split-modules
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_VERSION_MAJOR: "1"
  APP_VERSION_MINOR_OFFSET: "0"

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 计算版本号
      id: version
      shell: bash
      run: |
        MINOR=$(( ${{ github.run_number }} - ${{ env.APP_VERSION_MINOR_OFFSET }} ))
        VERSION="PR.${{ env.APP_VERSION_MAJOR }}.${MINOR}"
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        echo "APP_NAME=智一会计_${VERSION}" >> $GITHUB_OUTPUT
        echo "Build version: ${VERSION}"

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 openpyxl pandas xlrd reportlab pyinstaller

    - name: 执行 PyInstaller 打包
      run: pyinstaller --noconsole --onedir --name "${{ steps.version.outputs.APP_NAME }}" --icon main.ico --add-data "pages;pages" --add-data "dialogs;dialogs" --hidden-import=pages.client --hidden-import=pages.voucher --hidden-import=pages.account --hidden-import=pages.settle --hidden-import=pages.report --hidden-import=pages.audit --hidden-import=pages.system --hidden-import=dialogs.client_dialogs --hidden-import=dialogs.voucher_dialogs --hidden-import=dialogs.import_dialogs --hidden-import=dialogs.account_dialogs main.py

    - name: 压缩输出目录
      shell: bash
      run: |
        cd dist
        7z a "../${{ steps.version.outputs.APP_NAME }}.zip" "${{ steps.version.outputs.APP_NAME }}/"
        echo "✓ Zipped dist folder"

    - name: 上传 ZIP
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.version.outputs.APP_NAME }}
        path: ${{ steps.version.outputs.APP_NAME }}.zip
        retention-days: 30