name: 构建 Windows 智一会计

on:
  push:
    branches:
      - main
      - refactor/split-modules
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # ── 版本控制 ──────────────────────────────────────────
  # 小版本 (1.1, 1.2...) 由 github.run_number 自动递增
  # 大版本升级时（PR.2.0）：手动将下面的 APP_VERSION_MAJOR 改为 2
  # 并将 APP_VERSION_MINOR_OFFSET 设为当前 run_number，使小版本归零
  APP_VERSION_MAJOR: "1"
  APP_VERSION_MINOR_OFFSET: "0"
  # ─────────────────────────────────────────────────────

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 计算版本号
      id: version
      shell: bash
      run: |
        MINOR=$(( ${{ github.run_number }} - ${{ env.APP_VERSION_MINOR_OFFSET }} ))
        VERSION="PR.${{ env.APP_VERSION_MAJOR }}.${MINOR}"
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        echo "APP_NAME=智一会计_${VERSION}" >> $GITHUB_OUTPUT
        echo "Build version: ${VERSION}"

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 openpyxl pandas xlrd reportlab pyinstaller

    - name: 执行 PyInstaller 打包
      run: pyinstaller --noconsole --onefile --name "${{ steps.version.outputs.APP_NAME }}" --icon main.ico --add-data "pages;pages" --add-data "dialogs;dialogs" --hidden-import=pages.client --hidden-import=pages.voucher --hidden-import=pages.account --hidden-import=pages.settle --hidden-import=pages.report --hidden-import=pages.audit --hidden-import=pages.system --hidden-import=dialogs.client_dialogs --hidden-import=dialogs.voucher_dialogs --hidden-import=dialogs.import_dialogs --hidden-import=dialogs.account_dialogs main.py

    - name: 上传 EXE
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.version.outputs.APP_NAME }}
        path: dist/${{ steps.version.outputs.APP_NAME }}.exe
        retention-days: 30