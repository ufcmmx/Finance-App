name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install pyinstaller pyside6 openpyxl pandas xlrd

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed ^
          --name=智一会计 ^
          --icon=main.ico ^
          --add-data "pages;pages" ^
          main.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: 智一会计-Windows
        path: dist/智一会计.exe
        retention-days: 30
